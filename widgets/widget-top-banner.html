<!DOCTYPE html>
<html>
<head>
<title></title>
<style type="text/css">
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; }
  .ad-banner { display: none; width: 100%; position: relative; }
  .ad-banner.visible { display: block; }
  .ad-banner a { display: block; }
  .ad-banner img { width: 100%; height: 60px; object-fit: cover; display: block; }
  .ad-label { position: absolute; top: 4px; right: 6px; font-size: 10px; color: rgba(255,255,255,0.8); background: rgba(0,0,0,0.35); padding: 1px 5px; border-radius: 3px; pointer-events: none; }
</style>
</head>
<body>
<div class="ad-banner" id="adBanner">
  <a id="adLink" href="#" target="_top" rel="noopener">
    <img id="adImage" src="" alt="" />
  </a>
  <span class="ad-label">Ad</span>
</div>
<script>
var API_BASE = 'https://blockisland.onrender.com';
async function loadAd() {
  try {
    var res = await fetch(API_BASE + '/api/ads/serve?slot=top_banner');
    var data = await res.json();
    if (!data.ad_id) return;
    document.getElementById('adImage').src = data.image_url;
    document.getElementById('adLink').href = data.destination_url;
    document.getElementById('adBanner').classList.add('visible');
    navigator.sendBeacon(API_BASE + '/api/ads/' + data.ad_id + '/impression');
    document.getElementById('adLink').addEventListener('click', function() {
      navigator.sendBeacon(API_BASE + '/api/ads/' + data.ad_id + '/click');
    });
  } catch(e) {}
}
loadAd();
</script>
</body>
</html>
