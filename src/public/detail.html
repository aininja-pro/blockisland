<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Block Island</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Poppins:wght@400;600&display=swap" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Lato', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: #fff;
    color: #333;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
  }

  .detail-hero-wrap {
    position: relative;
    height: 280px;
    overflow: hidden;
  }
  .detail-hero {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    will-change: transform;
  }
  .detail-body {
    position: relative;
    background: #fff;
    padding: 18px 16px;
    z-index: 5;
  }
  .detail-name {
    font-family: 'Poppins', sans-serif;
    font-size: 28px;
    font-weight: 400;
    color: #2c5274;
    line-height: 1.15;
    letter-spacing: -0.3px;
    margin-bottom: 8px;
  }
  .detail-address-row {
    display: flex;
    align-items: center;
    color: #777;
    font-size: 15px;
    margin-bottom: 16px;
    font-weight: 400;
  }
  .detail-address-row svg {
    width: 16px;
    height: 16px;
    fill: #29547e;
    margin-right: 6px;
    flex-shrink: 0;
  }
  .see-route-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 14px;
    background: #29547e;
    color: #fff;
    border: none;
    border-radius: 25px;
    font-size: 15px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    cursor: pointer;
    text-decoration: none;
    margin-bottom: 24px;
  }
  .see-route-btn svg {
    width: 20px;
    height: 20px;
    fill: #fff;
    margin-right: 8px;
  }
  .detail-content {
    font-size: 17px;
    line-height: 1.6;
    color: #3a5068;
    padding-bottom: 16px;
  }
  .detail-content p { margin-bottom: 14px; }
  .detail-content p:empty { margin-bottom: 0; }
  .detail-content img {
    max-width: 100%;
    height: auto;
    border-radius: 4px;
    margin: 8px 0;
  }
  .detail-content a {
    color: #29547e;
    text-decoration: none;
  }
  .detail-content a[style*="background-color: rgb(41, 84, 126)"] {
    display: inline-block;
    background: #29547e !important;
    color: #fff !important;
    padding: 12px 28px !important;
    border-radius: 25px !important;
    font-size: 15px;
    font-weight: 600;
    text-decoration: none;
    letter-spacing: 0.3px;
  }
  .detail-content a[style*="background-color: rgb(204, 0, 0)"] {
    display: inline-block;
    background: #b91c1c !important;
    color: #fff !important;
    padding: 12px 28px !important;
    border-radius: 25px !important;
    font-size: 15px;
    font-weight: 600;
    text-decoration: none;
  }
  .detail-content .photo.top { display: none; }
  .action-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 16px;
    border-top: 1px solid #e0e0e0;
    background: #fff;
  }
  .action-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px 16px;
    border: 1.5px solid #29547e;
    border-radius: 25px;
    background: #fff;
    color: #29547e;
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
    flex: 1;
    min-width: 140px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .action-btn svg {
    width: 18px;
    height: 18px;
    fill: #29547e;
    margin-right: 8px;
    flex-shrink: 0;
  }
  .detail-map {
    width: 100%;
    height: 250px;
  }
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: #999;
    font-size: 15px;
  }
  .spinner {
    width: 30px; height: 30px;
    border: 3px solid #e0e0e0;
    border-top-color: #29547e;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="detail-page">
  <div class="loading">
    <div class="spinner"></div>
    Loading...
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const API_BASE = window.location.origin;
const params = new URLSearchParams(window.location.search);
const section = params.get('section') || '';
const itemIndex = parseInt(params.get('item'), 10);

async function loadDetail() {
  try {
    const url = section
      ? `${API_BASE}/api/feed/maps?section=${encodeURIComponent(section)}`
      : `${API_BASE}/api/feed/maps`;
    const res = await fetch(url);
    const data = await res.json();
    const items = data.items || [];
    const item = items[itemIndex];
    if (!item) {
      document.getElementById('detail-page').innerHTML = '<div class="loading">Item not found.</div>';
      return;
    }
    renderDetail(item);
  } catch (err) {
    document.getElementById('detail-page').innerHTML = '<div class="loading">Failed to load.</div>';
  }
}

function renderDetail(item) {
  let content = item.content || '';
  content = content.replace(/<div class="photo top"[\s\S]*?<\/div>\s*<br class="clear"\s*\/?>/i, '');
  content = content.replace(/<div class="texte">\s*/i, '');
  content = content.replace(/<\/div>\s*<br class="clear"\s*\/?>\s*$/i, '');

  const lat = parseFloat(item.latitude);
  const lng = parseFloat(item.longitude);
  const hasCoords = !isNaN(lat) && !isNaN(lng);
  const routeUrl = hasCoords
    ? `https://maps.google.com/maps?daddr=${lat},${lng}`
    : `https://maps.google.com/maps?q=${encodeURIComponent(item.address || item.title)}`;

  let html = '';

  html += `<div class="detail-hero-wrap">`;
  if (item.largeThumbnail || item.thumbnail) {
    html += `<img class="detail-hero" id="heroImg" src="${item.largeThumbnail || item.thumbnail}" alt="${esc(item.title)}" />`;
  }
  html += '</div>';

  html += '<div class="detail-body">';
  html += `<div class="detail-name">${esc(item.title)}</div>`;
  if (item.address && item.address.trim()) {
    html += `<div class="detail-address-row">
      <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      ${esc(item.address.trim())}
    </div>`;
  }
  html += `<a class="see-route-btn" href="${routeUrl}" target="_blank">
    <svg viewBox="0 0 24 24"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>
    SEE ROUTE
  </a>`;
  html += `<div class="detail-content">${content}</div>`;
  html += '</div>';

  html += '<div class="action-buttons">';
  if (item.website && item.website.trim()) {
    html += `<a class="action-btn" href="${item.website.trim()}" target="_blank">
      <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm6.93 6h-2.95c-.32-1.25-.78-2.45-1.38-3.56 1.84.63 3.37 1.91 4.33 3.56zM12 4.04c.83 1.2 1.48 2.53 1.91 3.96h-3.82c.43-1.43 1.08-2.76 1.91-3.96zM4.26 14C4.1 13.36 4 12.69 4 12s.1-1.36.26-2h3.38c-.08.66-.14 1.32-.14 2 0 .68.06 1.34.14 2H4.26zm.82 2h2.95c.32 1.25.78 2.45 1.38 3.56-1.84-.63-3.37-1.9-4.33-3.56zm2.95-8H5.08c.96-1.66 2.49-2.93 4.33-3.56C8.81 5.55 8.35 6.75 8.03 8zM12 19.96c-.83-1.2-1.48-2.53-1.91-3.96h3.82c-.43 1.43-1.08 2.76-1.91 3.96zM14.34 14H9.66c-.09-.66-.16-1.32-.16-2 0-.68.07-1.35.16-2h4.68c.09.65.16 1.32.16 2 0 .68-.07 1.34-.16 2zm.25 5.56c.6-1.11 1.06-2.31 1.38-3.56h2.95c-.96 1.65-2.49 2.93-4.33 3.56zM16.36 14c.08-.66.14-1.32.14-2 0-.68-.06-1.34-.14-2h3.38c.16.64.26 1.31.26 2s-.1 1.36-.26 2h-3.38z"/></svg>
      SEE WEBSITE
    </a>`;
  }
  if (item.phoneNumber && item.phoneNumber.trim()) {
    html += `<a class="action-btn" href="tel:${item.phoneNumber.trim()}">
      <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
      ${esc(item.phoneNumber.trim())}
    </a>`;
  }
  if (item.email && item.email.trim()) {
    html += `<a class="action-btn" href="mailto:${item.email.trim()}">
      <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
      SEND AN EMAIL
    </a>`;
  }
  html += '</div>';

  if (hasCoords) {
    html += `<div class="detail-map" id="detail-map"></div>`;
  }

  document.getElementById('detail-page').innerHTML = html;
  document.title = item.title;

  // Parallax on scroll
  window.addEventListener('scroll', () => {
    const heroImg = document.getElementById('heroImg');
    if (heroImg) {
      heroImg.style.transform = `translateY(${window.scrollY * 0.4}px)`;
    }
  });

  // Init map
  if (hasCoords) {
    setTimeout(() => {
      const detailMap = L.map('detail-map', { zoomControl: true, scrollWheelZoom: false });
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
      }).addTo(detailMap);
      detailMap.setView([lat, lng], 15);
      L.marker([lat, lng]).addTo(detailMap);
    }, 100);
  }
}

function esc(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

loadDetail();
</script>
</body>
</html>
